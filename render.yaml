services:
  - type: web
    name: sentinel-backend
    env: docker
    region: oregon
    plan: free
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/v1/healthz
    disk:
      name: sentinel-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: SENTINEL_APP_ENV
        value: production
      - key: SENTINEL_REQUIRE_API_KEY
        value: "true"
      - key: SENTINEL_AUTO_CREATE_SCHEMA
        value: "true"
      - key: SENTINEL_DATABASE_URL
        value: sqlite+aiosqlite:///./data/sentinel_support.db
      - key: SENTINEL_API_KEY
        generateValue: true
      - key: SENTINEL_GEMINI_API_KEY
        sync: false
